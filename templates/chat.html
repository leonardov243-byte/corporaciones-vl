<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f0f0f;
  color: #e8e8e8;
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wrapper {
  width: 100%;
  max-width: 680px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 24px 20px 20px;
  gap: 12px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 16px;
  border-bottom: 1px solid #1e1e1e;
}

.leo-icon {
  width: 38px; height: 38px;
  background: #fff;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.header-text h1 {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.3px;
}

.header-text p {
  font-size: 12px;
  color: #555;
  font-weight: 300;
  margin-top: 1px;
}

.online {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #555;
}

.online-dot {
  width: 6px; height: 6px;
  background: #22c55e;
  border-radius: 50%;
}

/* CHATBOX */
.chatbox {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 4px 0;
  scrollbar-width: none;
}
.chatbox::-webkit-scrollbar { display: none; }

.msg {
  display: flex;
  flex-direction: column;
  max-width: 75%;
  animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.bot  { align-self: flex-start; align-items: flex-start; }

.msg-name {
  font-size: 10px;
  color: #444;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
  padding: 0 2px;
}

.msg-bubble {
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.65;
  font-weight: 400;
}

.msg.user .msg-bubble {
  background: #fff;
  color: #0f0f0f;
  border-radius: 16px 16px 4px 16px;
  font-weight: 500;
}

.msg.bot .msg-bubble {
  background: #1a1a1a;
  color: #d8d8d8;
  border-radius: 16px 16px 16px 4px;
  border: 1px solid #242424;
}

.msg.bot .msg-bubble p { margin-bottom: 6px; }
.msg.bot .msg-bubble p:last-child { margin-bottom: 0; }
.msg.bot .msg-bubble strong { color: #fff; font-weight: 600; }
.msg.bot .msg-bubble ul, .msg.bot .msg-bubble ol { padding-left: 16px; margin: 4px 0; }
.msg.bot .msg-bubble li { margin-bottom: 3px; }
.msg.bot .msg-bubble code {
  background: #242424;
  color: #aaa;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 12px;
  font-family: monospace;
}

/* Typing */
.typing-wrap {
  display: none;
  flex-direction: column;
  align-self: flex-start;
  gap: 4px;
}

.typing-wrap .msg-name {
  font-size: 10px;
  color: #444;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 0 2px;
}

.typing-bubble {
  background: #1a1a1a;
  border: 1px solid #242424;
  padding: 12px 16px;
  border-radius: 16px 16px 16px 4px;
  display: flex;
  gap: 4px;
  align-items: center;
}

.dot {
  width: 6px; height: 6px;
  background: #444;
  border-radius: 50%;
  animation: blink 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%,100% { opacity: 0.3; transform: scale(0.8); }
  50%      { opacity: 1;   transform: scale(1); }
}

/* INPUT */
.input-wrap {
  border: 1px solid #1e1e1e;
  border-radius: 14px;
  background: #141414;
  padding: 12px 14px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color 0.2s;
}
.input-wrap:focus-within { border-color: #333; }

.input-row { display: flex; gap: 8px; align-items: flex-end; }

textarea {
  flex: 1;
  background: transparent;
  color: #e8e8e8;
  border: none;
  outline: none;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 400;
  resize: none;
  line-height: 1.5;
  max-height: 100px;
  min-height: 22px;
}
textarea::placeholder { color: #3a3a3a; }

.btn-send {
  background: #fff;
  color: #0f0f0f;
  border: none;
  width: 36px; height: 36px;
  border-radius: 9px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
  transition: all 0.15s;
}
.btn-send:hover { background: #e0e0e0; }
.btn-send:active { transform: scale(0.93); }

.input-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hint { font-size: 11px; color: #333; }
.hint kbd {
  background: #1e1e1e;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  font-family: monospace;
  color: #555;
}

.btn-clear {
  background: transparent;
  border: none;
  color: #333;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  transition: color 0.15s;
}
.btn-clear:hover { color: #666; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="leo-icon">🤖</div>
    <div class="header-text">
      <h1>Leo</h1>
      <p>Asistente virtual</p>
    </div>
    <div class="online">
      <div class="online-dot"></div>
      En línea
    </div>
  </div>

  <div class="chatbox" id="chatbox">
    <div class="msg bot">
      <div class="msg-name">Leo</div>
      <div class="msg-bubble">¡Hola! ¿En qué te puedo ayudar hoy?</div>
    </div>
    <div class="typing-wrap" id="typing">
      <div class="msg-name">Leo</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-row">
      <textarea id="input" placeholder="Escribe un mensaje..." rows="1"></textarea>
      <button class="btn-send" id="enviar">➤</button>
    </div>
    <div class="input-footer">
      <span class="hint"><kbd>Enter</kbd> enviar · <kbd>Shift+Enter</kbd> nueva línea</span>
      <button class="btn-clear" id="limpiar">Limpiar</button>
    </div>
  </div>

</div>
<script>
const chatbox = document.getElementById('chatbox');
const input   = document.getElementById('input');
const typing  = document.getElementById('typing');
marked.setOptions({ breaks: true, gfm: true });

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function agregarMensaje(texto, tipo) {
  const wrap   = document.createElement('div');
  wrap.className = 'msg ' + tipo;
  const name   = document.createElement('div');
  name.className = 'msg-name';
  name.textContent = tipo === 'user' ? 'Tú' : 'Leo';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = tipo === 'bot' ? marked.parse(texto) : esc(texto);
  wrap.appendChild(name);
  wrap.appendChild(bubble);
  chatbox.insertBefore(wrap, typing);
  chatbox.scrollTop = chatbox.scrollHeight;
}

async function enviar() {
  const texto = input.value.trim();
  if (!texto) return;
  input.value = '';
  input.style.height = 'auto';
  agregarMensaje(texto, 'user');
  typing.style.display = 'flex';
  chatbox.scrollTop = chatbox.scrollHeight;
  try {
    const res  = await fetch('/chat_api', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({mensaje: texto})
    });
    const data = await res.json();
    typing.style.display = 'none';
    agregarMensaje(data.respuesta, 'bot');
  } catch(e) {
    typing.style.display = 'none';
    agregarMensaje('Error de conexión. Intenta de nuevo.', 'bot');
  }
}

async function limpiarChat() {
  await fetch('/chat_limpiar', {method:'POST'});
  chatbox.querySelectorAll('.msg').forEach(m => m.remove());
  agregarMensaje('¡Hola! ¿En qué te puedo ayudar hoy?', 'bot');
}

document.getElementById('enviar').addEventListener('click', enviar);
document.getElementById('limpiar').addEventListener('click', limpiarChat);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});
</script>
</body>
</html>
