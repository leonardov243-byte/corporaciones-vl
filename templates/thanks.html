<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporaciones VL | Registro Exitoso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background-image: radial-gradient(ellipse at 20% 50%, #1a1a2e 0%, transparent 50%),
                              radial-gradient(ellipse at 80% 50%, #0d1117 0%, transparent 50%);
        }
        .container { width: 100%; max-width: 420px; padding: 20px; text-align: center; }
        .logo { margin-bottom: 40px; }
        .logo h1 { color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
        .logo span { color: #4f8ef7; }
        .logo p { color: #555; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }
        .card { background: #111118; border: 1px solid #1e1e2e; border-radius: 16px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #4f8ef7, #2563eb);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 25px auto;
            font-size: 30px;
        }
        .card h2 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 10px; }
        .card p { color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }
        .card p span { color: #4f8ef7; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #4f8ef7, #2563eb);
            border: none; border-radius: 8px;
            padding: 14px 35px;
            color: #fff; font-size: 13px; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            text-decoration: none;
            transition: opacity 0.3s, transform 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .footer { text-align: center; color: #333; font-size: 11px; margin-top: 30px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Corp<span>VL</span></h1>
            <p>Sistema de Gestión Empresarial</p>
        </div>
        <div class="card">
            <div class="icon">✓</div>
            <h2>¡Registro Exitoso!</h2>
            <p>Tus datos han sido guardados correctamente en el servidor.<br>
            Bienvenido a <span>Corporaciones VL</span>.</p>
            <a href="/" class="btn">Volver al inicio</a>
        </div>
        <p class="footer">© 2025 Corporaciones VL · Todos los derechos reservados</p>
    </div>
</body>
</html>
