<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporaciones VL | Sistema de Registro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background-image: radial-gradient(ellipse at 20% 50%, #1a1a2e 0%, transparent 50%),
                              radial-gradient(ellipse at 80% 50%, #0d1117 0%, transparent 50%);
        }
        .container { width: 100%; max-width: 420px; padding: 20px; }
        .logo { text-align: center; margin-bottom: 40px; }
        .logo h1 { color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
        .logo span { color: #4f8ef7; }
        .logo p { color: #555; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }
        .card { background: #111118; border: 1px solid #1e1e2e; border-radius: 16px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .card h2 { color: #fff; font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .card p { color: #555; font-size: 13px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #888; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
        input { width: 100%; background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 8px; padding: 14px 16px; color: #fff; font-size: 14px; transition: border-color 0.3s; outline: none; }
        input:focus { border-color: #4f8ef7; box-shadow: 0 0 0 3px rgba(79,142,247,0.1); }
        input::placeholder { color: #333; }
        button { width: 100%; background: linear-gradient(135deg, #4f8ef7, #2563eb); border: none; border-radius: 8px; padding: 14px; color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: opacity 0.3s, transform 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .divider { border: none; border-top: 1px solid #1e1e2e; margin: 25px 0; }
        .footer { text-align: center; color: #333; font-size: 11px; margin-top: 30px; letter-spacing: 1px; }
        .strength-bar-wrapper { margin-top: 8px; }
        .strength-bar-track { height: 4px; background: #1e1e2e; border-radius: 4px; overflow: hidden; }
        .strength-bar-fill { height: 100%; width: 0; border-radius: 4px; transition: width 0.3s ease, background 0.3s ease; }
        .strength-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-top: 5px; color: #555; transition: color 0.3s; }
        .strength-weak  { background: #ef4444; }
        .strength-medium { background: #f59e0b; }
        .strength-strong { background: #22c55e; }
        .label-weak   { color: #ef4444; }
        .label-medium { color: #f59e0b; }
        .label-strong { color: #22c55e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Corp<span>VL</span></h1>
            <p>Sistema de Gestión Empresarial</p>
        </div>
        <div class="card">
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para continuar</p>
            <form action="/register" method="post">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" name="email" placeholder="nombre@empresa.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                    <div class="strength-bar-wrapper">
                        <div class="strength-bar-track">
                            <div class="strength-bar-fill" id="strengthBar"></div>
                        </div>
                        <div class="strength-label" id="strengthLabel"></div>
                    </div>
                </div>
                <button type="submit">Registrarse</button>
            </form>
            <hr class="divider">
        </div>
        <p class="footer">© 2025 Corporaciones VL · Todos los derechos reservados</p>
    </div>
<script>
    const passwordInput = document.getElementById('password');
    const bar = document.getElementById('strengthBar');
    const label = document.getElementById('strengthLabel');

    passwordInput.addEventListener('input', function () {
        const val = this.value;
        const score = getStrength(val);

        bar.className = 'strength-bar-fill';
        label.className = 'strength-label';

        if (val.length === 0) {
            bar.style.width = '0';
            label.textContent = '';
            return;
        }

        if (score < 2) {
            bar.style.width = '33%';
            bar.classList.add('strength-weak');
            label.classList.add('label-weak');
            label.textContent = 'Débil';
        } else if (score < 4) {
            bar.style.width = '66%';
            bar.classList.add('strength-medium');
            label.classList.add('label-medium');
            label.textContent = 'Media';
        } else {
            bar.style.width = '100%';
            bar.classList.add('strength-strong');
            label.classList.add('label-strong');
            label.textContent = 'Fuerte';
        }
    });

    function getStrength(p) {
        let score = 0;
        if (p.length >= 8) score++;
        if (p.length >= 12) score++;
        if (/[A-Z]/.test(p)) score++;
        if (/[0-9]/.test(p)) score++;
        if (/[^A-Za-z0-9]/.test(p)) score++;
        return score;
    }
</script>

<!-- Botón flotante Leo -->



<style>
.leo-fab {
    position: fixed;
    bottom: 28px; right: 28px;
    width: 56px; height: 56px;
    background: #fff;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: all 0.2s;
    z-index: 999;
}
.leo-fab:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }
.leo-fab span {
    font-family: Georgia, serif;
    font-size: 26px;
    font-weight: 700;
    color: #0a0a0a;
    line-height: 1;
}
.leo-dot {
    position: absolute;
    top: 10px; right: 10px;
    width: 8px; height: 8px;
    background: #22c55e;
    border-radius: 50%;
}
</style>
<button class="leo-fab" onclick="window.location.href='/chat'" title="Habla con Leo">
    <div class="leo-dot"></div>
    <span>L</span>
</button>

</body>
</html>
